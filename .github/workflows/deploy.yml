name: Deploy to oxelia51.com

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-oxelia51
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Pack release bundle
        run: |
          mkdir -p release/backend release/frontend-dist release/deploy
          rsync -a --delete \
            --exclude venv \
            --exclude __pycache__ \
            --exclude .env \
            backend/ release/backend/
          rsync -a --delete frontend/dist/ release/frontend-dist/
          rsync -a deploy/ release/deploy/
          tar czf /tmp/dorm-release.tar.gz -C release .

      - name: Apply release on server
        run: |
          set -euo pipefail
          rm -rf /tmp/dorm-release
          mkdir -p /tmp/dorm-release
          tar xzf /tmp/dorm-release.tar.gz -C /tmp/dorm-release
          sudo bash /tmp/dorm-release/deploy/apply-release.sh /tmp/dorm-release
          rm -rf /tmp/dorm-release /tmp/dorm-release.tar.gz
